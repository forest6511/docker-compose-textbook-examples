services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
